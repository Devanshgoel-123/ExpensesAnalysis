services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ledgerline
      POSTGRES_PASSWORD: ledgerline
      POSTGRES_DB: ledgerline
    volumes:
      - ledgerline_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerline -d ledgerline"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ledgerline_pg: